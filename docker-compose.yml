version: '3.8'

services:
  # 1. DATABASE CONTAINER (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: student_db_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: student_management_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Exposing port internally within docker network for security

  # 2. BACKEND API CONTAINER (C# ASP.NET Core)
  backend:
    build:
      context: ./StudentManagementServer
      dockerfile: Dockerfile
    container_name: student_backend_container
    restart: always
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=student_management_db;Username=postgres;Password=postgrespassword
      - JwtSettings__Key=this_is_a_very_secret_key_for_student_management_system_api_123456
      - JwtSettings__Issuer=StudentManagementApi
      - JwtSettings__Audience=StudentManagementClient
    # Internally listens on port 8080

  # 3. FRONTEND PORTAL CONTAINER (Nginx & React Build)
  frontend:
    build:
      context: ./student-management-client
      dockerfile: Dockerfile
    container_name: student_frontend_container
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80" # Expose public web port 80 to the internet

volumes:
  pgdata:
    driver: local
